<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page - SITA UPJ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- KONTEN UTAMA LATAR BELAKANG -->
<div class="login-wrapper">
    
    <!-- LAPISAN GELAP (OVERLAY) -->
    <div class="overlay"></div>

    <!-- KARTU FORM LOGIN -->
    <div class="login-card">
      <div class="card-header">
          <h2>SITA UPJ</h2>
          <p>Sistem Informasi Tugas Akhir</p>
      </div>

      <form>
          <!-- 1. Input NIM/NIDN dengan Ikon Pengguna (User) -->
          <div class="input-group">
            <span class="input-icon">
              <!-- SVG Icon User/Pengguna -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </span>
            <input type="text" placeholder="NIM / NIDN" required>
          </div>

          <!-- 2. Input Password dengan Ikon Gembok (Lock) -->
          <div class="input-group">
            <span class="input-icon">
              <!-- SVG Icon Gembok/Secure Lock -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </span>
            <input type="password" placeholder="Password" required>
          </div>

          <button type="submit" class="btn-login">LOGIN MASUK</button>
      </form>

      <div class="card-footer">
          <a href="#">← Kembali ke Beranda</a>
      </div>
    </div>

</div>

</body>
</html>
